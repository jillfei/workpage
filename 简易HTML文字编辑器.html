<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简易HTML文字编辑器</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; padding: 20px; background: #f5f5f5; }
        .toolbar { background: white; padding: 15px; margin-bottom: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { padding: 8px 15px; margin: 0 5px; cursor: pointer; background: #4CAF50; color: white; border: none; border-radius: 3px; }
        button:hover { background: #45a049; }
        #editorFrame { width: 100%; height: 600px; border: 1px solid #ddd; background: white; }
        .info { color: #666; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="toolbar">
        <h3>📝 简易HTML文字编辑器</h3>
        <button onclick="openFile()">📂 打开HTML文件</button>
        <button onclick="saveFile()">💾 保存修改</button>
        <button onclick="enableEdit()">✏️ 开启编辑</button>
        <button onclick="disableEdit()">👁️ 预览模式</button>
        <p class="info">使用说明：1.点击"打开HTML文件" 2.点击"开启编辑" 3.直接点击文字修改 4.点击"保存修改"</p>
    </div>
    <iframe id="editorFrame"></iframe>

    <script>
        let currentFile = null;
        const frame = document.getElementById('editorFrame');
        
        // 打开文件
        function openFile() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.html,.htm';
            input.onchange = function(e) {
                currentFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    frame.contentDocument.write(event.target.result);
                    frame.contentDocument.designMode = 'Off';
                };
                reader.readAsText(currentFile);
            };
            input.click();
        }
        
        // 开启编辑
        function enableEdit() {
            frame.contentDocument.designMode = 'On';
            frame.contentDocument.body.contentEditable = 'true';
            alert('编辑模式已开启：直接点击文字即可修改');
        }
        
        // 预览模式
        function disableEdit() {
            frame.contentDocument.designMode = 'Off';
            frame.contentDocument.body.contentEditable = 'false';
        }
        
        // 保存文件
        function saveFile() {
            if (!currentFile) {
                alert('请先打开一个HTML文件');
                return;
            }
            const content = frame.contentDocument.documentElement.outerHTML;
            const blob = new Blob([content], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFile.name;
            a.click();
            URL.revokeObjectURL(url);
            alert('文件已下载！请保存到原位置覆盖原文件。');
        }
    </script>
</body>
</html>
