<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台图标库 — 500 Iconify Icons</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fc;--fg:#1a1d2e;--card:#fff;--card-hover:#f0f2f8;
  --border:#e2e5ef;--primary:#6366f1;--primary-light:#818cf8;
  --muted:#6b7280;--muted-light:#9ca3af;
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;
  --radius:0.75rem;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.08),0 4px 10px rgba(0,0,0,.04);
  --font-sans:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --transition:200ms cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#0f1117;--fg:#e5e7eb;--card:#1a1d2e;--card-hover:#252840;
  --border:#2d3148;--primary:#818cf8;--primary-light:#a5b4fc;
  --muted:#9ca3af;--muted-light:#6b7280;
  --shadow:0 1px 3px rgba(0,0,0,.3);--shadow-lg:0 10px 25px rgba(0,0,0,.4);
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:var(--font-sans);background:var(--bg);color:var(--fg);min-height:100vh;transition:background var(--transition),color var(--transition)}

/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);padding:1rem 2rem;backdrop-filter:blur(12px);background:rgba(255,255,255,.85)}
[data-theme="dark"] .header{background:rgba(26,29,46,.85)}
.header-inner{max-width:1600px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap}
.logo{font-size:1.25rem;font-weight:700;color:var(--primary);white-space:nowrap;display:flex;align-items:center;gap:.5rem}
.logo svg{width:28px;height:28px}
.search-box{flex:1;min-width:240px;max-width:480px;position:relative}
.search-box input{width:100%;padding:.625rem 1rem .625rem 2.75rem;border:1.5px solid var(--border);border-radius:var(--radius);font-size:.9rem;background:var(--bg);color:var(--fg);outline:none;transition:border var(--transition),box-shadow var(--transition)}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.search-box input::placeholder{color:var(--muted-light)}
.search-box .search-icon{position:absolute;left:.85rem;top:50%;transform:translateY(-50%);color:var(--muted-light);font-size:1.1rem;pointer-events:none}
.header-actions{display:flex;align-items:center;gap:.75rem;margin-left:auto}
.badge{background:var(--primary);color:#fff;font-size:.75rem;font-weight:600;padding:.2rem .6rem;border-radius:999px;white-space:nowrap}
.theme-toggle{width:38px;height:38px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--bg);color:var(--fg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.15rem;transition:all var(--transition)}
.theme-toggle:hover{border-color:var(--primary);color:var(--primary)}

/* Layout: sidebar + main */
.app-body{display:flex;max-width:1600px;margin:0 auto;min-height:calc(100vh - 70px)}

/* Sidebar Category Tabs */
.tabs-wrap{width:200px;min-width:200px;padding:1.25rem 0 1.25rem 1.5rem;position:sticky;top:70px;height:calc(100vh - 70px);overflow-y:auto;scrollbar-width:thin}
.tabs-wrap::-webkit-scrollbar{width:4px}
.tabs-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.tabs{display:flex;flex-direction:column;gap:.25rem}
.tab{padding:.5rem .85rem;border-radius:var(--radius);font-size:.8rem;font-weight:500;white-space:nowrap;cursor:pointer;border:1.5px solid transparent;background:transparent;color:var(--muted);transition:all var(--transition);user-select:none;display:flex;align-items:center;justify-content:space-between}
.tab:hover{background:var(--card-hover);color:var(--fg)}
.tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.tab .count{font-size:.65rem;opacity:.6;margin-left:.5rem;background:rgba(0,0,0,.06);padding:.1rem .4rem;border-radius:999px;flex-shrink:0}
.tab.active .count{background:rgba(255,255,255,.2)}

/* Grid */
.grid-wrap{flex:1;min-width:0;padding:1.25rem 2rem 3rem 1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.75rem}

/* Icon Card */
.icon-card{position:relative;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:1.25rem .75rem .75rem;display:flex;flex-direction:column;align-items:center;gap:.5rem;cursor:pointer;transition:all var(--transition);overflow:hidden}
.icon-card:hover{border-color:var(--primary-light);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.icon-card .icon-display{font-size:2rem;height:2.5rem;display:flex;align-items:center;justify-content:center;color:var(--fg);transition:color var(--transition)}
.icon-card:hover .icon-display{color:var(--primary)}
.icon-card .icon-name{font-size:.65rem;font-family:var(--font-mono);color:var(--muted);text-align:center;line-height:1.3;word-break:break-all;max-width:100%;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}

/* Hover Copy Buttons */
.copy-btns{position:absolute;bottom:0;left:0;right:0;display:flex;gap:0;opacity:0;transform:translateY(8px);transition:all var(--transition);pointer-events:none}
.icon-card:hover .copy-btns{opacity:1;transform:translateY(0);pointer-events:auto}
.copy-btn{flex:1;padding:.4rem .25rem;font-size:.6rem;font-family:var(--font-mono);font-weight:500;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.25rem;transition:background var(--transition)}
.copy-btn:first-child{background:var(--primary);color:#fff;border-radius:0 0 0 calc(var(--radius) - 1.5px)}
.copy-btn:first-child:hover{background:#4f46e5}
.copy-btn:last-child{background:#10b981;color:#fff;border-radius:0 0 calc(var(--radius) - 1.5px) 0}
.copy-btn:last-child:hover{background:#059669}

/* Toast */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:#1a1d2e;color:#fff;padding:.65rem 1.5rem;border-radius:var(--radius);font-size:.85rem;font-weight:500;z-index:9999;opacity:0;transition:all 300ms cubic-bezier(.4,0,.2,1);pointer-events:none;box-shadow:var(--shadow-lg);display:flex;align-items:center;gap:.5rem}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
[data-theme="dark"] .toast{background:#e5e7eb;color:#1a1d2e}

/* Empty State */
.empty-state{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--muted)}
.empty-state .empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.4}
.empty-state p{font-size:1rem}

/* Responsive */
@media(max-width:900px){
  .tabs-wrap{width:160px;min-width:160px;padding-left:1rem}
  .tab{font-size:.75rem;padding:.4rem .65rem}
}
@media(max-width:768px){
  .header{padding:.75rem 1rem}
  .app-body{flex-direction:column}
  .tabs-wrap{width:100%;min-width:100%;height:auto;position:static;padding:.75rem 1rem;overflow-x:auto;overflow-y:hidden}
  .tabs{flex-direction:row;gap:.5rem;padding-bottom:.5rem}
  .tab{white-space:nowrap;border:1.5px solid var(--border);background:var(--card);border-radius:999px;padding:.4rem 1rem}
  .tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .grid-wrap{padding:1rem}
  .grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.5rem}
  .icon-card{padding:1rem .5rem .5rem}
}
@media(max-width:480px){
  .grid{grid-template-columns:repeat(3,1fr)}
  .header-inner{gap:.75rem}
  .search-box{min-width:160px}
}
</style>
</head>

    <div class="search-box">

    <div class="header-actions">

    </div>
  </div>
</header>

/* ====== APP LOGIC ====== */
const grid=document.getElementById('iconGrid');
const searchInput=document.getElementById('searchInput');
const tabsContainer=document.getElementById('tabsContainer');
const countBadge=document.getElementById('countBadge');
const toast=document.getElementById('toast');
const themeToggle=document.getElementById('themeToggle');

// Build categories
const categories=[...new Set(ICONS.map(i=>i.c))];
const catCounts={};
categories.forEach(c=>{catCounts[c]=ICONS.filter(i=>i.c===c).length});

// Render tabs
function renderTabs(){
  let html=`<div class="tab active" data-cat="all">全部<span class="count">${ICONS.length}</span></div>`;
  categories.forEach(c=>{
    html+=`<div class="tab" data-cat="${c}">${c}<span class="count">${catCounts[c]}</span></div>`;
  });
  tabsContainer.innerHTML=html;
  tabsContainer.querySelectorAll('.tab').forEach(t=>{
    t.addEventListener('click',()=>{
      tabsContainer.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      renderGrid(t.dataset.cat,searchInput.value);
    });
  });
}

// Render grid
function renderGrid(cat='all',query=''){
  let items=ICONS;
  if(cat!=='all') items=items.filter(i=>i.c===cat);
  if(query.trim()){
    const q=query.toLowerCase().trim();
    const terms=q.split(/\s+/);
    items=items.filter(i=>{
      const name=i.n.toLowerCase();
      const kws=i.k.join(' ').toLowerCase();
      const catLower=i.c.toLowerCase();
      return terms.every(t=>name.includes(t)||kws.includes(t)||catLower.includes(t));
    });
  }
  countBadge.textContent=`${items.length} icons`;
  if(!items.length){
    grid.innerHTML=`<div class="empty-state"><div class="empty-icon iconify" data-icon="mdi:magnify-close"></div><p>没有找到匹配的图标</p></div>`;
    return;
  }
  grid.innerHTML=items.map(i=>{
    const shortName=i.n.replace('mdi:','');
    return `<div class="icon-card" title="${i.n}">
      <span class="icon-display iconify" data-icon="${i.n}"></span>
      <span class="icon-name">${i.n}</span>
      <div class="copy-btns">
        <button class="copy-btn" data-copy="${i.n}" onclick="event.stopPropagation();copyText('${i.n}',this)">📋 ${i.n}</button>
        <button class="copy-btn" data-copy="${shortName}" onclick="event.stopPropagation();copyText('${shortName}',this)">📋 ${shortName}</button>
      </div>
    </div>`;
  }).join('');
}

// Copy
function copyText(text,btn){
  navigator.clipboard.writeText(text).then(()=>{
    showToast(`✅ 已复制: ${text}`);
  }).catch(()=>{
    // fallback
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();
    document.execCommand('copy');document.body.removeChild(ta);
    showToast(`✅ 已复制: ${text}`);
  });
}

// Toast
let toastTimer;
function showToast(msg){
  toast.textContent=msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>toast.classList.remove('show'),2000);
}

// Search
let searchTimer;
searchInput.addEventListener('input',()=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{
    const activeTab=tabsContainer.querySelector('.tab.active');
    renderGrid(activeTab?activeTab.dataset.cat:'all',searchInput.value);
  },150);
});

// Theme
function setTheme(dark){
  document.documentElement.setAttribute('data-theme',dark?'dark':'light');
  themeToggle.querySelector('.iconify').setAttribute('data-icon',dark?'mdi:white-balance-sunny':'mdi:weather-night');
  localStorage.setItem('icon-theme',dark?'dark':'light');
}
themeToggle.addEventListener('click',()=>{
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  setTheme(!isDark);
});

// Init
const savedTheme=localStorage.getItem('icon-theme');
if(savedTheme==='dark'||(!savedTheme&&window.matchMedia('(prefers-color-scheme:dark)').matches)){
  setTheme(true);
}
renderTabs();
renderGrid();
