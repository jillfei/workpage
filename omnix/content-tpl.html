<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>智能体列表</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            background: #f9fafb;
            color: #1f2937;
        }

        .page-wrap {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── 滚动条 ── */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #d1d5db; }

        
    </style>
</head>
<body>
<div class="page-wrap">

    <!-- 顶部栏 -->
    <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-8 flex-shrink-0">
        <div class="flex items-center space-x-2 text-sm text-gray-500">
            <span>实验室</span>
            <iconify-icon icon="mdi:chevron-right"></iconify-icon>
            <span class="text-gray-900 font-medium">智能体</span>
        </div>
        <div class="flex items-center space-x-4">
            <button class="flex items-center space-x-2 px-4 py-2 text-gray-600 hover:text-gray-900 hover:bg-gray-50 rounded-lg transition-colors">
                <iconify-icon icon="mdi:trash-can-outline"></iconify-icon>
                <span>删除</span>
            </button>
            <button class="flex items-center space-x-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors">
                <iconify-icon icon="mdi:plus"></iconify-icon>
                <span>创建</span>
            </button>
        </div>
    </header>

    <!-- 内容滚动区 -->
    <div class="flex-1 overflow-y-auto custom-scrollbar p-6">

        <!-- 筛选栏 -->
        <div class="flex items-center space-x-4 mb-6">
            <div class="relative flex-1 max-w-md">
                <iconify-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-lg" icon="mdi:magnify"></iconify-icon>
                <input class="w-full pl-10 pr-4 py-2 bg-white border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm"
                       placeholder="搜索" type="text"/>
            </div>
            <div class="flex items-center space-x-2">
                <button class="flex items-center space-x-1 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50">
                    <span>全部状态</span>
                    <iconify-icon class="text-gray-400" icon="mdi:chevron-down"></iconify-icon>
                </button>
            </div>
        </div>

        <!-- 智能体卡片列表 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">


        </div>
    </div><!-- end 内容滚动区 -->
</div><!-- end page-wrap -->
</body>
</html>
