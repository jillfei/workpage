<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OmniX</title>
    <script src="https://modao.cc/agent-py/static/source/js/tailwindcss.js"></script>
    <script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', sans-serif;
            background: #f9fafb;
            color: #1f2937;
        }

        /* ── 外层布局容器 ── */
        .layout-shell {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* ══════════════════════════════
           左侧侧边导航栏  200px 固定
        ══════════════════════════════ */
        .sidebar {
            width: 200px;
            flex-shrink: 0;
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Logo 区 */
        .sidebar-logo {
            padding: 18px 16px 14px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 1px solid #f3f4f6;
            flex-shrink: 0;
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: #2563eb;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .logo-title {
            font-size: 15px;
            font-weight: 700;
            color: #111827;
            letter-spacing: -0.3px;
        }

        .logo-badge {
            font-size: 9px;
            font-weight: 600;
            background: #111827;
            color: #fff;
            padding: 1px 5px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        /* 导航菜单滚动区 */
        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: 8px 10px 8px;
        }

        .sidebar-nav::-webkit-scrollbar { width: 4px; }
        .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
        .sidebar-nav::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 4px; }

        /* 菜单分组标题 */
        .nav-group-label {
            font-size: 10px;
            font-weight: 600;
            color: #9ca3af;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 10px 8px 4px;
        }

        .nav-group-label:first-child {
            padding-top: 6px;
        }

        /* 菜单项 */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px 8px;
            border-radius: 8px;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            user-select: none;
        }

        .nav-item iconify-icon {
            font-size: 17px;
            flex-shrink: 0;
            color: #6b7280;
            transition: color 0.15s;
        }

        .nav-item:hover {
            background: #f3f4f6;
            color: #111827;
        }

        .nav-item:hover iconify-icon {
            color: #374151;
        }

        /* 激活状态 */
        .nav-item.active {
            background: #eff6ff;
            color: #2563eb;
            font-weight: 500;
            border: 1px solid #bfdbfe;
        }

        .nav-item.active iconify-icon {
            color: #2563eb;
        }

        /* 底部用户区 */
        .sidebar-footer {
            padding: 12px 14px;
            border-top: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid #e5e7eb;
            object-fit: cover;
            flex-shrink: 0;
        }

        .user-meta {
            flex: 1;
            overflow: hidden;
        }

        .user-name {
            font-size: 12px;
            font-weight: 500;
            color: #111827;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-email {
            font-size: 11px;
            color: #9ca3af;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .logout-btn {
            color: #9ca3af;
            cursor: pointer;
            transition: color 0.15s;
            flex-shrink: 0;
            font-size: 17px;
            background: none;
            border: none;
        }

        .logout-btn:hover {
            color: #2563eb;
        }

        /* ══════════════════════════════
           右侧主内容区域 — iframe 铺满
        ══════════════════════════════ */
        .content-area {
            flex: 1;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #f9fafb;
        }

        /* iframe 加载遮罩 */
        .iframe-loader {
            position: absolute;
            inset: 0;
            background: #f9fafb;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .iframe-loader.visible {
            opacity: 1;
            pointer-events: all;
        }

        .loader-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="layout-shell">

    <!-- ══════════════════════════════════════
         左侧固定侧边导航栏  (200px)
    ══════════════════════════════════════ -->
    <aside class="sidebar">

        <!-- Logo -->
        <div class="sidebar-logo">
            <div class="logo-icon">
                <iconify-icon icon="mdi:robot-confused" style="font-size:18px;color:#fff;"></iconify-icon>
            </div>
            <span class="logo-title">OmniX</span>
            <span class="logo-badge">SVITE</span>
        </div>

        <!-- 菜单导航 -->
        <nav class="sidebar-nav" id="sideNav">


            <div class="nav-group-label">资源</div>

            <a class="nav-item" data-src="./model-manage.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:shape-outline"></iconify-icon>
                <span>模型管理</span>
            </a>
            <a class="nav-item" data-src="./rag.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:book-open-outline"></iconify-icon>
                <span>RAG</span>
            </a>
            <a class="nav-item" data-src="./database.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:database-outline"></iconify-icon>
                <span>数据库</span>
            </a>
            <a class="nav-item" data-src="./prompt.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:message-text-outline"></iconify-icon>
                <span>提示词</span>
            </a>
            <a class="nav-item" data-src="./tools.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:tools"></iconify-icon>
                <span>工具</span>
            </a>

            <div class="nav-group-label">Chat运营</div>

            <a class="nav-item" data-src="./pin-config.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:pin-outline"></iconify-icon>
                <span>置顶配置</span>
            </a>
            <a class="nav-item" data-src="./banner-config.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:image-outline"></iconify-icon>
                <span>Banner配置</span>
            </a>
            <a class="nav-item" data-src="./agent-content.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:shape-outline"></iconify-icon>
                <span>智能体分类</span>
            </a>

            <div class="nav-group-label">企业管理</div>

            <a class="nav-item"
               data-src="./qygl/qycy.html"
               onclick="navigate(this)"
               id="navAgent">
                <iconify-icon icon="mdi:robot"></iconify-icon>
                <span>企业成员</span>
            </a>
            <a class="nav-item" data-src="./qygl/gryh.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:shield-star-outline"></iconify-icon>
                <span>个人用户</span>
            </a>
            <a class="nav-item" data-src="./skill-platform.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:lightning-bolt-outline"></iconify-icon>
                <span>部门管理</span>
            </a>
            <a class="nav-item" data-src="./mcp.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:connection"></iconify-icon>
                <span>角色权限</span>
            </a>
            <a class="nav-item" data-src="./mcp.html" onclick="navigate(this)">
                <iconify-icon icon="mdi:connection"></iconify-icon>
                <span>菜单管理</span>
            </a>


        <!-- prd文档链接 -->
            <div class="nav-group-label">版本管理</div>

            <a class="nav-item active"
               data-src="./版本更新日志.html"
               onclick="navigate(this)">
                <iconify-icon icon="mdi:robot-outline"></iconify-icon>
                <span>版本日志</span>
            </a>


        </nav>

        <!-- 底部用户信息 -->
        <div class="sidebar-footer">
            <div class="user-info">
                <img class="user-avatar"
                     src="https://modao.cc/agent-py/media/generated_images/2026-05-27/17718e76067f4762a85e4e89249784e8.jpg"
                     alt="用户头像"/>
                <div class="user-meta">
                    <p class="user-name">管理员 孙礼飞</p>
                    <p class="user-email">slf-31338@zhink.cc</p>
                </div>
                <button class="logout-btn" title="退出登录">
                    <iconify-icon icon="mdi:logout"></iconify-icon>
                </button>
            </div>
        </div>

    </aside>

    <!-- ══════════════════════════════════════
         右侧主内容区域 — 铺满 iframe
    ══════════════════════════════════════ -->
    <div class="content-area">
        <!-- 加载遮罩 -->
        <div class="iframe-loader" id="iframeLoader">
            <div class="loader-spinner"></div>
        </div>

        <!-- 内容 iframe：默认加载智能体内容页 -->
        <iframe
            id="mainFrame"
            class="content-iframe"
            src="./版本更新日志.html"
            title="内容区域">
        </iframe>
    </div>

</div>

<script>
    const frame  = document.getElementById('mainFrame');
    const loader = document.getElementById('iframeLoader');

    /**
     * 切换 iframe src，并高亮对应菜单项
     * @param {HTMLElement} el  被点击的 .nav-item
     */
    function navigate(el) {
        const src = el.dataset.src;
        if (!src) return;

        // 更新激活态
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');

        // 显示加载遮罩
        loader.classList.add('visible');

        // 切换 iframe
        frame.src = src;
    }

    // iframe 加载完成后隐藏遮罩
    frame.addEventListener('load', () => {
        loader.classList.remove('visible');
    });

    // 容错：3 秒后强制隐藏遮罩（防止跨域页面不触发 load）
    frame.addEventListener('error', () => {
        loader.classList.remove('visible');
    });
</script>

</body>
</html>
