<html lang="zh-CN"><head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>版本更新日志</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');

        :root {
            --bg: oklch(0.975 0.005 260);
            --bg-card: oklch(1 0 0);
            --fg: oklch(0.18 0.01 260);
            --fg-muted: oklch(0.50 0.01 260);
            --fg-subtle: oklch(0.62 0.01 260);
            --border: oklch(0.91 0.005 260);
            --border-light: oklch(0.94 0.003 260);
            --accent: oklch(0.55 0.18 255);
            --accent-soft: oklch(0.92 0.04 255);
            --accent-fg: oklch(0.35 0.15 255);
            --green: oklch(0.55 0.15 155);
            --green-soft: oklch(0.93 0.04 155);
            --green-fg: oklch(0.30 0.10 155);
            --amber: oklch(0.65 0.14 75);
            --amber-soft: oklch(0.95 0.05 75);
            --amber-fg: oklch(0.40 0.10 75);
            --red: oklch(0.58 0.18 25);
            --red-soft: oklch(0.94 0.03 25);
            --red-fg: oklch(0.38 0.12 25);
            --violet: oklch(0.55 0.18 290);
            --violet-soft: oklch(0.93 0.04 290);
            --violet-fg: oklch(0.35 0.14 290);
            --shadow-sm: 0 1px 2px oklch(0.18 0.01 260 / 0.04);
            --shadow-md: 0 4px 16px oklch(0.18 0.01 260 / 0.06);
            --shadow-lg: 0 8px 30px oklch(0.18 0.01 260 / 0.08);
            --radius: 0.75rem;
        }

        *, *::before, *::after { box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Microsoft YaHei', system-ui, sans-serif;
            background: var(--bg);
            color: var(--fg);
            -webkit-font-smoothing: antialiased;
        }

        .page-wrap {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: oklch(0.82 0.005 260); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: oklch(0.72 0.01 260); }

        /* Header */
        .header {
            background: oklch(1 0 0 / 0.85);
            backdrop-filter: blur(16px) saturate(1.5);
            -webkit-backdrop-filter: blur(16px) saturate(1.5);
            border-bottom: 1px solid var(--border);
        }

        /* Timeline */
        .timeline-line {
            position: absolute;
            left: 23px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to bottom, var(--border) 0%, oklch(0.88 0.01 255) 50%, var(--border) 100%);
        }

        .timeline-dot {
            position: absolute;
            left: 16px;
            top: 22px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--accent);
            border: 3px solid var(--bg-card);
            box-shadow: 0 0 0 2px var(--accent), var(--shadow-sm);
            z-index: 2;
            transition: all 0.3s ease;
        }

        .timeline-dot.active {
            box-shadow: 0 0 0 2px var(--accent), 0 0 12px oklch(0.55 0.18 255 / 0.3);
        }

        /* Version card */
        .version-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .version-card:hover {
            box-shadow: var(--shadow-md);
            border-color: oklch(0.86 0.01 260);
            transform: translateY(-1px);
        }

        .version-card.is-expanded {
            border-color: oklch(0.82 0.03 255);
            box-shadow: var(--shadow-md), 0 0 0 1px oklch(0.55 0.18 255 / 0.06);
        }

        /* Tag styles */
        .tag-new { background: var(--violet-soft); color: var(--violet-fg); }
        .tag-fix { background: var(--amber-soft); color: var(--amber-fg); }
        .tag-break { background: var(--red-soft); color: var(--red-fg); }
        .tag-optimize { background: var(--green-soft); color: var(--green-fg); }
        .tag-feature { background: var(--accent-soft); color: var(--accent-fg); }

        /* Status badge */
        .status-planned { background: oklch(0.95 0.005 260); color: var(--fg-subtle); }
        .status-dev { background: var(--accent-soft); color: var(--accent-fg); }
        .status-done { background: var(--green-soft); color: var(--green-fg); }
        .status-review { background: var(--amber-soft); color: var(--amber-fg); }

        /* Expand/collapse */
        .change-detail {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            opacity: 0;
        }
        .change-detail.expanded {
            max-height: 2000px;
            opacity: 1;
        }

        /* Diff highlight */
        .diff-add {
            background: oklch(0.97 0.015 155);
            border-left: 3px solid oklch(0.60 0.16 155);
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            line-height: 1.6;
            color: oklch(0.28 0.08 155);
        }
        .diff-modify {
            background: oklch(0.96 0.012 255);
            border-left: 3px solid oklch(0.55 0.16 255);
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            line-height: 1.6;
            color: oklch(0.28 0.10 255);
        }
        .diff-remove {
            background: oklch(0.97 0.01 25);
            border-left: 3px solid oklch(0.58 0.18 25);
            padding: 10px 14px;
            margin: 6px 0;
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            line-height: 1.6;
            text-decoration: line-through;
            opacity: 0.7;
            color: oklch(0.38 0.12 25);
        }

        /* Stat card */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }
        .stat-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        /* Search input */
        .search-input {
            background: oklch(0.97 0.003 260);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 14px 8px 40px;
            font-size: 13px;
            color: var(--fg);
            transition: all 0.2s ease;
            outline: none;
            width: 260px;
        }
        .search-input:focus {
            border-color: oklch(0.70 0.10 255);
            box-shadow: 0 0 0 3px oklch(0.55 0.18 255 / 0.1);
            background: var(--bg-card);
        }
        .search-input::placeholder { color: var(--fg-subtle); }

        /* Chevron animation */
        .chevron-icon {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: oklch(0.65 0.01 260);
        }
        .chevron-icon.rotated {
            transform: rotate(180deg);
        }

        /* Section label */
        .section-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        /* Version badge mono */
        .version-badge {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
            font-size: 17px;
            letter-spacing: -0.02em;
            color: var(--fg);
        }

        /* Fade-in animation */
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .version-item {
            animation: fadeSlideIn 0.4s ease-out both;
        }
        .version-item:nth-child(2) { animation-delay: 0.08s; }
        .version-item:nth-child(3) { animation-delay: 0.16s; }
        .version-item:nth-child(4) { animation-delay: 0.24s; }

        /* Pulse dot */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 oklch(0.65 0.14 75 / 0.4); }
            70% { box-shadow: 0 0 0 6px oklch(0.65 0.14 75 / 0); }
            100% { box-shadow: 0 0 0 0 oklch(0.65 0.14 75 / 0); }
        }
        .pulse-dot {
            animation: pulse-ring 2s infinite;
        }

        /* Filter button */
        .filter-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            font-size: 13px;
            color: var(--fg-muted);
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .filter-btn:hover {
            color: var(--fg);
            border-color: oklch(0.82 0.01 260);
            box-shadow: var(--shadow-sm);
        }

        /* Link card */
        .doc-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: oklch(0.96 0.012 255);
            color: oklch(0.40 0.12 255);
            border-radius: 10px;
            font-size: 13px;
            text-decoration: none;
            border: 1px solid oklch(0.90 0.02 255);
            transition: all 0.2s ease;
        }
        .doc-link:hover {
            background: oklch(0.93 0.025 255);
            border-color: oklch(0.82 0.04 255);
            box-shadow: var(--shadow-sm);
        }
    </style>

<body>
<div class="page-wrap">

    <!-- 顶部栏 -->
    <header class="header px-8 flex items-center justify-between flex-shrink-0" style="height: 60px;">
        <div class="flex items-center gap-3">
            <div style="width: 32px; height: 32px; background: linear-gradient(135deg, oklch(0.55 0.18 255), oklch(0.50 0.20 280)); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="git-branch" aria-hidden="true" style="width: 16px; height: 16px; color: white;" class="lucide lucide-git-branch"><path d="M15 6a9 9 0 0 0-9 9V3"></path><circle cx="18" cy="6" r="3"></circle><circle cx="6" cy="18" r="3"></circle></svg>
            </div>
            <span class="text-base font-bold" style="color: var(--fg); letter-spacing: -0.01em;">版本更新日志</span>
            <span style="font-size: 11px; padding: 2px 8px; border-radius: 6px; background: oklch(0.93 0.01 260); color: var(--fg-subtle); font-weight: 500;">Changelog</span>
        </div>
        <div class="flex items-center gap-3">
            <div class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="search" aria-hidden="true" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--fg-subtle);" class="lucide lucide-search"><path d="m21 21-4.34-4.34"></path><circle cx="11" cy="11" r="8"></circle></svg>
                <input class="search-input" placeholder="搜索版本或变更内容..." type="text" id="searchInput">
            </div>
            <button class="filter-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="sliders-horizontal" aria-hidden="true" style="width: 14px; height: 14px;" class="lucide lucide-sliders-horizontal"><path d="M10 5H3"></path><path d="M12 19H3"></path><path d="M14 3v4"></path><path d="M16 17v4"></path><path d="M21 12h-9"></path><path d="M21 19h-5"></path><path d="M21 5h-7"></path><path d="M8 10v4"></path><path d="M8 12H3"></path></svg>
                <span>筛选</span>
            </button>
        </div>
    </header>

    <!-- 内容滚动区 -->
    <div class="flex-1 overflow-y-auto custom-scrollbar" style="padding: 28px 32px;">


        <!-- 时间线 -->
        <div class="relative">
            <div class="timeline-line"></div>

            <!-- ========== v2.0 ========== -->
            <div class="version-item mb-6 relative" style="padding-left: 48px;" data-version="v2.0">
                <div class="timeline-dot active"></div>

                <div class="version-card is-expanded" id="card-v20">
                    <div style="padding: 16px 24px; border-bottom: 1px solid var(--border-light); display: flex; align-items: center; justify-content: space-between; cursor: pointer;" onclick="toggleDetail('v20')">
                        <div class="flex items-center gap-4">
                            <div>
                                <div class="flex items-center gap-3">
                                    <span class="version-badge">v2.0</span>
                                    <span style="padding: 2px 10px; font-size: 11px; font-weight: 600; border-radius: 20px;" class="status-review">已完成</span>
                                </div>
                                <div style="font-size: 13px; color: var(--fg-subtle); margin-top: 4px;">2026-06-26 · 角色权限管理模块 PRD v3.0</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <div class="flex gap-1.5">
                                <span style="padding: 3px 10px; font-size: 11px; font-weight: 600; border-radius: 6px;" class="tag-new">新增 2</span>
                                <span style="padding: 3px 10px; font-size: 11px; font-weight: 600; border-radius: 6px;" class="tag-optimize">优化 0</span>
                            </div>
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="chevron-down" aria-hidden="true" class="lucide lucide-chevron-down chevron-icon rotated" id="chevron-v20" style="width: 20px; height: 20px;"><path d="m6 9 6 6 6-6"></path></svg>
                        </div>
                    </div>

                    <!-- Change summary -->
                    <div style="padding: 14px 24px; background: oklch(0.985 0.003 260); border-bottom: 1px solid var(--border-light);">
                        <div style="font-size: 13px; font-weight: 600; color: var(--fg-muted); margin-bottom: 6px;">📋 版本概述</div>
                        <p style="font-size: 13px; color: var(--fg-muted); line-height: 1.7; margin: 0;">
                            本版本初步建立统一的权限管控中心。核心新增<strong>用户管理</strong>体系，
                            实现部门管理、角色权限（预设）、用户管理。
                        </p>
                    </div>

                    <!-- Detailed changes -->
                    <div class="change-detail expanded" id="detail-v20">
                        <div style="padding: 20px 24px;">
                            <div style="display: flex; flex-direction: column; gap: 24px;">

                                <!-- 新增功能 -->
                                <div>
                                    <div class="section-label">
                                        <span style="padding: 3px 10px; font-size: 11px; font-weight: 600; border-radius: 6px;" class="tag-new">新增</span>
                                    </div>
                                    <div style="display: flex; flex-direction: column; gap: 2px;">
                                        <div class="diff-add"><strong>1 部门管理：</strong>部门管理是整个权限体系的组织基础。采用树形结构，支持无限层级，部门之间形成父子关系。
                                        </div>
                                        <!--div class="diff-add">
                                            <strong>4.2 角色权限：</strong>角色是权限的集合体，用户通过绑定角色获得对应的菜单访问权限和功能操作权限。本设计支持两级权限粒度：菜单级（可见/不可见）。
                                        </div-->
                                        <div class="diff-add"><strong>2 用户管理：</strong>新增用户管理入口。支持用户名、姓名、所属部门、多角色绑定、手机号、邮箱等字段。功能包含单个新增/编辑、批量导入导出、重置密码、组合筛选。
                                        </div>
                                        <!--div class="diff-add">
                                            <strong>4.4 个人用户：</strong>新增独立于企业组织架构的外部用户管理模块。个人用户不归属部门，角色固定为「个人角色」不可更改。字段精简（无部门字段），功能与企业成员基本一致但更轻量。

<script>
function toggleDetail(id) {
    var detail = document.getElementById('detail-' + id);
    var chevron = document.getElementById('chevron-' + id);
    var card = document.getElementById('card-' + id);
    if (detail.classList.contains('expanded')) {
        detail.classList.remove('expanded');
        chevron.classList.remove('rotated');
        card.classList.remove('is-expanded');
    } else {
        detail.classList.add('expanded');
        chevron.classList.add('rotated');
        card.classList.add('is-expanded');
    }
}

        item.style.display = text.includes(keyword) ? '' : 'none';
    });
});
